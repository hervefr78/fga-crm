[alembic]
# Chemin du dossier de migrations (relatif a backend/)
script_location = alembic

# Format des noms de fichiers de migration : YYYYMMDD_HHMM_<rev>_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Permettre l'import de `app.*` depuis env.py
prepend_sys_path = .

# Encoding des fichiers de migration
output_encoding = utf-8

# L'URL est surchargee dynamiquement dans alembic/env.py via settings.database_url
# (laisser une valeur factice pour eviter les warnings d'init)
sqlalchemy.url = postgresql+psycopg2://placeholder

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
