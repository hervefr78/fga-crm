server {
  listen 3000;
  root /usr/share/nginx/html;
  index index.html;

  # Assets hashes par Vite (index-<hash>.js/css) : immuables -> cache long.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # index.html + fallback SPA : JAMAIS de cache navigateur.
  # Le navigateur revalide a chaque chargement -> recupere le nouveau index.html
  # (et donc le nouveau bundle) immediatement apres un deploy.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires -1;
  }
}
