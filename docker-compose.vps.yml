# =============================================================================
# FGA CRM - Docker Compose VPS (Caddy reverse proxy)
# =============================================================================
# Usage: docker compose -f docker-compose.vps.yml --env-file .env.production up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: fga-crm-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Redis Cache & Celery Broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: fga-crm-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # MinIO (S3-compatible file storage)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: fga-crm-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Backend API (FastAPI)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fga-crm-backend
    restart: always
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - APP_ENV=production
      - APP_DEBUG=false
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    networks:
      - internal
      - caddy-net

  # ---------------------------------------------------------------------------
  # Celery Worker (background tasks)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fga-crm-worker
    restart: always
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - APP_ENV=production
      - RUN_MIGRATIONS=0
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    networks:
      - internal
      - caddy-net

  # ---------------------------------------------------------------------------
  # Frontend (React + Vite)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: https://crm.fast-growth.fr/api/v1
    container_name: fga-crm-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - internal
      - caddy-net

volumes:
  postgres_data:
    name: fga-crm-postgres
  redis_data:
    name: fga-crm-redis
  minio_data:
    name: fga-crm-minio

networks:
  internal:
    driver: bridge
  caddy-net:
    external: true
