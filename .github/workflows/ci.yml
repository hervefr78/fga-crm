name: CI

# Lance lint + typecheck + tests sur chaque PR vers main et chaque push sur main.
# Couvre le multi-tenant + l'enrichissement (Icypeas bulk/webhook) ajoutes recemment.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les runs obsoletes sur une meme branche (economie de minutes CI).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Sync (frozen — deps runtime + dev)
        run: uv sync --frozen

      - name: Ruff (lint)
        # Version pinnee via uv.lock (groupe dev) — evite le drift de regles.
        run: uv run ruff check app/

      - name: Pytest
        # Tests en SQLite in-memory (cf. conftest) — aucun service externe requis.
        run: uv run pytest tests/ -q

  frontend:
    name: Frontend (tsc + eslint + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: ESLint (max-warnings 0)
        run: npm run lint

      - name: Vitest
        run: npm run test
