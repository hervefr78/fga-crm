name: CI

# Lance lint + typecheck + tests sur chaque PR vers main et chaque push sur main.
# Couvre le multi-tenant + l'enrichissement (Icypeas bulk/webhook) ajoutes recemment.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les runs obsoletes sur une meme branche (economie de minutes CI).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Ruff (lint)
        # Version epinglee = celle validee en local (evite le drift de regles).
        run: pipx run --spec ruff==0.15.0 ruff check app/

      - name: Pytest
        # Tests en SQLite in-memory (cf. conftest) — aucun service externe requis.
        run: poetry run pytest tests/ -q

  frontend:
    name: Frontend (tsc + eslint + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: ESLint (max-warnings 0)
        run: npm run lint

      - name: Vitest
        run: npm run test
